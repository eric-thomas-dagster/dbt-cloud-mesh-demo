type: dbt_cloud_mesh_demo.components.dbt_cloud_mesh_component.DbtCloudMeshComponent

attributes:
  workspace:
    account_id: 12345
    token: "{{ env.DBT_CLOUD_TOKEN }}"
    access_url: "https://cloud.getdbt.com"
    project_id: 100001
    environment_id: 200001

  op:
    name: silver_dbt_cloud_assets

  # "observe" = Dagster watches dbt Cloud runs but does not trigger them.
  #   Assets are non-materializable; a polling sensor captures run completions.
  # "orchestrate" = Dagster can trigger dbt Cloud runs directly.
  #   Assets are materializable; supports Declarative Automation.
  mode: observe

  # Don't refresh state from dbt Cloud on dev load (using pre-baked state)
  defs_state:
    management_type: LOCAL_FILESYSTEM
    refresh_if_dev: false

  # Polling sensor observes dbt Cloud runs triggered outside Dagster.
  # In observe mode, a sensor is created automatically even if this is false.
  # Set to true when using real dbt Cloud credentials.
  create_sensor: false

  # Enable source metadata so dbt sources (e.g. bronze tables) appear as
  # upstream assets with proper lineage. Without this, source asset keys
  # cannot be remapped and bronze lineage would be missing.
  translation_settings:
    enable_source_metadata: true
    enable_dbt_selection_by_name: true

  # Group overrides - assign Dagster groups based on dbt fqn path segments
  group_overrides:
    seed: raw
    staging: bronze
    silver: silver
